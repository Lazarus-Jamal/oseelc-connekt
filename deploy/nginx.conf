# /etc/nginx/sites-available/oseelc-connekt
# Copier ce fichier sur le VPS puis:
#   sudo ln -s /etc/nginx/sites-available/oseelc-connekt /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name oseelc-connekt.oseelc.org;

    # Redirige HTTP → HTTPS (activé après certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oseelc-connekt.oseelc.org;

    # Certificats SSL (générés par certbot)
    ssl_certificate     /etc/letsencrypt/live/oseelc-connekt.oseelc.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oseelc-connekt.oseelc.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Taille max upload (fiches Excel, documents)
    client_max_body_size 50M;

    # Proxy vers Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache long pour les assets statiques Next.js
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3000/_next/static/;
        add_header       Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_bypass 0;
    }

    # Fichiers uploadés
    location /uploads/ {
        alias /var/www/oseelc-connekt/apps/web/public/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Logs
    access_log /var/log/nginx/oseelc-connekt.access.log;
    error_log  /var/log/nginx/oseelc-connekt.error.log;
}
