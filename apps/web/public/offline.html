<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — Oseelc-connekt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 1.25rem;
      border: 1px solid #e2e8f0;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #f0fdf4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p  { font-size: 0.875rem; color: #64748b; line-height: 1.6; }
    button {
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      background: #0f766e;
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0d6b63; }
    .logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      margin: 0 auto 1.5rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo.png" alt="Oseelc" class="logo" onerror="this.style.display='none'" />
    <div class="icon">📡</div>
    <h1>Connexion indisponible</h1>
    <p>Vous êtes hors ligne. Vérifiez votre connexion internet et réessayez.</p>
    <button onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
