name: Deploy — Oseelc-connekt

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Déploiement en production
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout du code
        uses: actions/checkout@v4

      - name: 🚀 Déploiement via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/oseelc-connekt

            echo "==> Pull du code..."
            git pull origin main

            echo "==> Installation des dépendances..."
            pnpm install --frozen-lockfile

            echo "==> Génération du client Prisma..."
            pnpm db:generate

            echo "==> Build de l'application..."
            pnpm build

            echo "==> Synchronisation de la base de données..."
            cd packages/db && pnpm db:push && cd ../..

            echo "==> Redémarrage de l'application..."
            pm2 restart oseelc-connekt || pm2 start pnpm \
              --name "oseelc-connekt" \
              --cwd /var/www/oseelc-connekt/apps/web \
              -- start

            echo "==> ✅ Déploiement terminé"
